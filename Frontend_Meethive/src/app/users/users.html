<div class="users-container">
  <header class="navbar">
    <div class="logo">MeetHive</div>
    <nav class="nav-links">
      <span class="back-link" (click)="goBack()">← Back</span>
      <span class="active">Users</span>
    </nav>
  </header>

  <main class="content">
    <h2>Registered Users</h2>

    <!-- Toast -->
    <div *ngIf="showToast" class="toast">{{ toastMessage }}</div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users; trackBy: trackById">
          <td>{{ user.fullName }}</td>
          <td>{{ user.email }}</td>
          <td>
            <button 
              *ngIf="!user.isBlocked" 
              class="block-btn" 
              (click)="toggleBlock(user)">
              Block
            </button>
            <button 
              *ngIf="user.isBlocked" 
              class="unblock-btn" 
              (click)="toggleBlock(user)">
              Unblock
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </main>
</div>
