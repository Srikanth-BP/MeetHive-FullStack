<div class="my-events-container">
  <header class="navbar">
    <div class="logo">MeetHive</div>
    <nav>
      <ul>
        <li (click)="backToDashboard()">Back</li>
        <li class="active">My Events</li>
      </ul>
    </nav>
  </header>

  <main class="content">
    <h2>My Events</h2>
    <div *ngIf="myEvents.length === 0" class="empty">No events RSVP'd yet</div>

    <div *ngFor="let event of myEvents" class="event-card">
      <h3>{{ event.title }}</h3>
      <p><strong>Date:</strong> {{ event.date }} | <strong>Time:</strong> {{ event.time }}</p>
      <p><strong>Venue:</strong> {{ event.venue }}</p>
      <button class="btn-cancel" (click)="cancelRsvp(event)">Cancel RSVP</button>
    </div>
  </main>
</div>
