<div class="dashboard-container">
  <header class="navbar">
    <div class="logo">MeetHive</div>
    <nav>
      <ul>
        <li routerLink="/user-dashboard" routerLinkActive="active">Home</li>
        <li (click)="goToMyEvents()">My Events</li>
        <li class="logout" (click)="logout()">Logout</li>
      </ul>
    </nav>
  </header>

  <main class="content">
    <h2>Upcoming Events</h2>

    <div *ngFor="let event of events" class="event-card">
      <h3>{{ event.title }}</h3>
      <p><strong>Date:</strong> {{ event.date }} | <strong>Time:</strong> {{ event.time }}</p>
      <p><strong>Venue:</strong> {{ event.venue }}</p>
      <button class="btn-rsvp" *ngIf="!event.rsvp" (click)="rsvp(event)">RSVP</button>
      <span *ngIf="event.rsvp" class="status">✅ RSVP'd</span>
    </div>
  </main>
</div>
