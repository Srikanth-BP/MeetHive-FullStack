<div class="my-events-container">
  <div class="my-events-card">
    <h2>My Events</h2>

    <div *ngIf="myEvents.length === 0" class="empty">
      <p>You have not RSVP'd to any events yet.</p>
      <button (click)="goBack()">⬅ Back to Dashboard</button>
    </div>

    <div *ngFor="let event of myEvents" class="event-card">
      <h3>{{ event.title }}</h3>
      <p><strong>Date:</strong> {{ event.date }} | <strong>Time:</strong> {{ event.time }}</p>
      <p><strong>Venue:</strong> {{ event.venue }}</p>

      <button class="btn-cancel" (click)="cancelRSVP(event)">❌ Cancel RSVP</button>
    </div>

    <div class="back-btn" *ngIf="myEvents.length > 0">
      <button (click)="goBack()">⬅ Back to Dashboard</button>
    </div>
  </div>
</div>
